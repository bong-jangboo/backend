name: "🚀 기능 추가 또는 개선"
description: "새로운 기능 추가 또는 기존 기능 개선 요청"
title: "[Feat] "
labels: ["✨ feat", "🛠 enhancement"]
assignees: []

body:
  - type: textarea
    id: overview
    attributes:
      label: 📌 개요
      description: 어떤 기능을 추가/개선하려는지 설명해주세요.

  - type: textarea
    id: reason
    attributes:
      label: 🤔 필요성
      description: 이 기능이 왜 필요한가요?

  - type: textarea
    id: todo
    attributes:
      label: ✅ 작업 항목
      value: |
        - [ ] 기능 설계
        - [ ] 구현
        - [ ] 테스트
        - [ ] 문서화

  - type: textarea
    id: effect
    attributes:
      label: 💡 기대 효과
      description: 기능이 완료되면 어떤 문제를 해결할 수 있나요?
