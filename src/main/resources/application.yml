spring:
  config:
    import: file:.env.${spring.profiles.active}[.properties] # 동적: 프로파일 따라 .env.dev 등 자동 로드
  profiles:
    active: dev # 기본 dev (로컬 개발 편의, 배포 시 오버라이드)

  datasource:
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        dialect:
          storage_engine: ${JPA_STORAGE_ENGINE:innodb}
        format_sql: ${JPA_FORMAT_SQL:true}
        show_sql: ${JPA_SHOW_SQL:true}
        use_sql_comments: ${JPA_USE_SQL_COMMENTS:true}
    open-in-view: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:info}
    org.springframework.boot.autoconfigure: info # auto-report 컴팩트 (상세 스킵 숨김)
    org.hibernate.SQL: ${LOGGING_LEVEL_ORG_HIBERNATE_SQL:info} # JPA SQL 유지
    com.bongjangboo: ${LOGGING_LEVEL_APP:debug} # 앱 패키지: 디버깅용
  file:
    name: ${LOGGING_FILE_NAME:}
    path: ${LOGGING_FILE_PATH:}

jwt:
  secret_key: ${JWT_SECRET}
  access_token:
    valid_time: ${JWT_ACCESS_TOKEN_VALID}
  refresh_token:
    valid_time: ${JWT_REFRESH_TOKEN_VALID}


output:
  ansi:
    enabled: never
