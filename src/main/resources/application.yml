spring:
  config:
    import: file:.env.${spring.profiles.active}[.properties]

  # 활성 프로필 선택 (dev/prod)
  profiles:
    active: dev

  # 데이터베이스 연결 설정
  datasource:
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  # JPA/Hibernate 설정
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        dialect.storage_engine: ${JPA_STORAGE_ENGINE:innodb}
        format_sql: ${JPA_FORMAT_SQL:true}
        show_sql: ${JPA_SHOW_SQL:true}
        use_sql_comments: ${JPA_USE_SQL_COMMENTS:true}
    # OSIV(Open Session In View) 비활성화
    open-in-view: false

  # 파일 업로드 설정
  servlet:
    multipart:
      enabled: true          # 멀티파트 업로드 활성화
      max-file-size: 10MB    # 단일 파일 최대 크기
      max-request-size: 10MB # 전체 요청 최대 크기


  # security 설정
  security:
    oauth2:
      client:
        registration:
          naver:
            client-name: naver
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            authorization-grant-type: authorization_code
            scope: name,email
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

# JWT 토큰 설정
jwt:
  secret: ${JWT_SECRET}                           # JWT 서명용 비밀키
  access-token-validity: ${JWT_ACCESS_TOKEN_VALID}   # 액세스 토큰 유효시간 (초)
  refresh-token-validity: ${JWT_REFRESH_TOKEN_VALID} # 리프레시 토큰 유효시간 (초)


# 로깅 설정
logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:info}                                            # 전체 로그 레벨
    org.springframework.boot.autoconfigure: ${LOGGING_LEVEL_AUTOCONFIGURE:warn} # Spring Boot 자동 설정 로그
    org.hibernate.SQL: ${LOGGING_LEVEL_SQL:debug}                              # Hibernate SQL 로그
    org.hibernate.type.descriptor.sql.BasicBinder: ${LOGGING_LEVEL_SQL_PARAM:info}  # SQL 파라미터 바인딩 로그
    org.springframework.security: ${LOGGING_LEVEL_SECURITY:info}               # Spring Security 로그
    org.springframework.web: ${LOGGING_LEVEL_WEB:info}                         # 웹 요청/응답 로그
    org.springframework.transaction: ${LOGGING_LEVEL_TRANSACTION:info}          # 트랜잭션 로그
    com.bongjangboo: ${LOGGING_LEVEL_APP:debug}                               # 애플리케이션 패키지 로그
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5level){highlight} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"                             # 애플리케이션 패키지 로그

