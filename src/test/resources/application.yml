spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        show_sql: true

  web:
    resources:
      add-mappings: false

  autoconfigure:
    exclude:

logging:
  level:
    root: info
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace

jwt:
  secret_key: Q4P+zTVdf1LNgVXCnkhWlQqoAxxLy0DuHEPOF6d+R18=
  access_token:
    valid_time: 3600
  refresh_token:
    valid_time: 604800

output:
  ansi:
    enabled: always
